<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Preeqbs Sitesi - Korumalı</title>
  <style>
    /* Şifre girilene kadar her şeyi gizle */
    #anaİcerik { display: none; }
    
    body { background-color: #0d0d0d; color: #b300ff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
    .link-kart { background-color: #1a1a1a; border-radius: 15px; padding: 20px; margin: 20px auto; width: 300px; color: white; border: 1px solid #333; position: relative; }
    .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-islem { font-size: 12px; padding: 5px 10px; margin: 5px; }
    .btn-sil { background-color: #dc3545; }
    .btn-duzen { background-color: #ffc107; color: black; }
    #siteAyarlar { margin-top: 50px; cursor: pointer; color: #ff00ff; font-weight: bold; border: 1px dashed #ff00ff; padding: 10px; display: inline-block; }
  </style>
</head>
<body>

  <!-- Şifre Doğruysa Burası Görünecek -->
  <div id="anaİcerik">
    <h1>Hoşgeldin Preeqbs</h1>
    <div id="linkler"></div>
    <div id="siteAyarlar" onclick="ekle()">➕ Yeni Link Ekle</div>
    <p style="color: #444; margin-top: 20px;">Oturum kapatmak için sayfayı yenileyin.</p>
  </div>

  <script>
    // Şifre: Preeq.6327 (Hashlenmiş hali)
    const ADMIN_HASH = "76e828d9c394980a3111fba8996e382894314789569766956276856493b2a0c7";
    
    let linkler = JSON.parse(localStorage.getItem("preeqLinks")) || [{ isim: "Google", url: "https://www.google.com" }];

    // Hash fonksiyonu
    async function hashHesapla(metin) {
      const encoder = new TextEncoder();
      const veri = encoder.encode(metin);
      const hashBuffer = await crypto.subtle.digest('SHA-256', veri);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // GİRİŞ KONTROLÜ (Site açılır açılmaz çalışır)
    async function girisYap() {
      let sifre = prompt("Giriş anahtarını giriniz:");
      if (!sifre) {
        document.body.innerHTML = "<h1>Erişim Reddedildi.</h1><button onclick='location.reload()'>Tekrar Dene</button>";
        return;
      }

      const girilenHash = await hashHesapla(sifre);

      if (girilenHash === ADMIN_HASH) {
        document.getElementById("anaİcerik").style.display = "block";
        render();
      } else {
        alert("Yanlış Şifre!");
        location.reload(); // Yanlışsa sayfayı tazele
      }
    }

    function render() {
      const container = document.getElementById("linkler");
      container.innerHTML = "";
      linkler.forEach((link, i) => {
        container.innerHTML += `
          <div class="link-kart">
            <h2>${link.isim}</h2>
            <button class="btn" onclick="window.open('${link.url}', '_blank')">Git</button>
            <br>
            <button class="btn btn-islem btn-duzen" onclick="duzenle(${i})">Düzenle</button>
            <button class="btn btn-islem btn-sil" onclick="sil(${i})">Sil</button>
          </div>`;
      });
      localStorage.setItem("preeqLinks", JSON.stringify(linkler));
    }

    function ekle() {
      let ad = prompt("Site adı:");
      let url = prompt("URL (https://...):");
      if(ad && url) { linkler.push({isim: ad, url: url}); render(); }
    }

    function sil(i) {
      if(confirm("Bu linki silmek istediğine emin misin?")) {
        linkler.splice(i, 1);
        render();
      }
    }

    function duzenle(i) {
      let yeniAd = prompt("Yeni isim:", linkler[i].isim);
      let yeniUrl = prompt("Yeni URL:", linkler[i].url);
      if(yeniAd && yeniUrl) {
        linkler[i] = {isim: yeniAd, url: yeniUrl};
        render();
      }
    }

    // Sayfa yüklenince direkt şifre sor
    window.onload = girisYap;
  </script>
</body>
</html>
