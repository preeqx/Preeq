<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Preeqbs Sitesi</title>
  <style>
    body { background-color: #0d0d0d; color: #b300ff; font-family: Arial, sans-serif; text-align: center; }
    h1 { margin-top: 20px; }
    .link-kart { background-color: #1a1a1a; border-radius: 15px; padding: 20px; margin: 20px auto; width: 300px; color: white; border: 1px solid #333; }
    .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn:hover { opacity: 0.8; }
    .btn-duzenle { background-color: #ffc107; color: black; margin-left: 5px; }
    .btn-sil { background-color: #dc3545; margin-left: 5px; }
    #siteAyarlar { margin-top: 50px; cursor: pointer; color: #ff00ff; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Hoşgeldin Preeqbs</h1>
  <div id="linkler"></div>
  <div id="siteAyarlar" onclick="siteAyarlarıPanel()">⚙️ Site Ayarları</div>

  <script>
    // Şifrenin (Preeq.6327) SHA-256 Hash hali:
    const ADMIN_HASH = "76e828d9c394980a3111fba8996e382894314789569766956276856493b2a0c7";

    // Linkleri tarayıcı hafızasından (localStorage) çekiyoruz
    let linkler = JSON.parse(localStorage.getItem("preeqLinks")) || [{ isim: "Google", url: "https://www.google.com" }];

    // Şifreyi doğrulamak için hash hesaplayan fonksiyon
    async function hashHesapla(metin) {
      const encoder = new TextEncoder();
      const veri = encoder.encode(metin);
      const hashBuffer = await crypto.subtle.digest('SHA-256', veri);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function renderLinkler() {
      let container = document.getElementById("linkler");
      container.innerHTML = "";
      linkler.forEach((link, index) => {
        let kart = document.createElement("div");
        kart.className = "link-kart";
        kart.innerHTML = `
          <h2>${link.isim}</h2>
          <button class="btn" onclick="window.open('${link.url}', '_blank')">Git</button>
          <button class="btn btn-duzenle" onclick="islemYap('3', ${index})">Düzenle</button>
          <button class="btn btn-sil" onclick="islemYap('2', ${index})">Sil</button>
        `;
        container.appendChild(kart);
      });
      // Verileri tarayıcıya kaydet
      localStorage.setItem("preeqLinks", JSON.stringify(linkler));
    }

    async function siteAyarlarıPanel() {
      let sifre = prompt("Admin şifresini giriniz:");
      if (!sifre) return;

      const girilenHash = await hashHesapla(sifre);

      if (girilenHash === ADMIN_HASH) {
        let secim = prompt("Yapmak istediğiniz işlem:\n1- Ekle\n2- Sil\n3- Düzenle");
        islemYap(secim);
      } else {
        alert("Hatalı şifre!");
      }
    }

    function islemYap(secim, index = null) {
      if (secim === "1") {
        let isim = prompt("Site İsmi:");
        let url = prompt("Site URL (https://...):");
        if (isim && url) linkler.push({ isim, url });
      } 
      else if (secim === "2") {
        let hedef = index !== null ? index : prompt("Silinecek linkin sıra numarasını girin (0, 1, 2...):");
        if (hedef !== null) linkler.splice(hedef, 1);
      } 
      else if (secim === "3") {
        let hedef = index !== null ? index : prompt("Düzenlenecek linkin sıra numarasını girin (0, 1, 2...):");
        if (linkler[hedef]) {
          let yeniIsim = prompt("Yeni İsim:", linkler[hedef].isim);
          let yeniUrl = prompt("Yeni URL:", linkler[hedef].url);
          if (yeniIsim && yeniUrl) linkler[hedef] = { isim: yeniIsim, url: yeniUrl };
        }
      }
      renderLinkler();
    }

    renderLinkler();
  </script>
</body>
</html>
