<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Preeqbs Sitesi</title>
  <style>
    body { background-color: #0d0d0d; color: #b300ff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    h1 { margin-top: 20px; }
    .link-konteyner { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .link-kart { background-color: #1a1a1a; border-radius: 15px; padding: 20px; width: 250px; color: white; border: 1px solid #333; position: relative; }
    .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.3s; width: 100%; }
    .btn:hover { background-color: #0056b3; }
    #siteAyarlar { margin-top: 50px; cursor: pointer; color: #ff00ff; font-weight: bold; border: 1px solid #ff00ff; padding: 10px 20px; display: inline-block; border-radius: 5px; }
    #siteAyarlar:hover { background-color: #ff00ff; color: black; }
  </style>
</head>
<body>

  <h1>Hoşgeldin Preeqbs</h1>
  <div id="linkler" class="link-konteyner"></div>
  
  <div id="siteAyarlar" onclick="adminPaneli()">⚙️ Site Ayarları</div>

  <script>
    // Şifre: Preeq.6327 (GitHub'da görünmemesi için Hash hali)
    const ADMIN_HASH = "76e828d9c394980a3111fba8996e382894314789569766956276856493b2a0c7";

    // Verileri tarayıcı hafızasından çek
    let linkler = JSON.parse(localStorage.getItem("preeqLinks")) || [{ isim: "Google", url: "https://www.google.com" }];

    // Şifre kontrolü için hash fonksiyonu
    async function hashCevir(metin) {
      const msgBuffer = new TextEncoder().encode(metin);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function render() {
      const container = document.getElementById("linkler");
      container.innerHTML = "";
      linkler.forEach((link, i) => {
        container.innerHTML += `
          <div class="link-kart">
            <h2>${link.isim}</h2>
            <button class="btn" onclick="window.open('${link.url}', '_blank')">Git</button>
          </div>`;
      });
      localStorage.setItem("preeqLinks", JSON.stringify(linkler));
    }

    async function adminPaneli() {
      let sifre = prompt("Admin şifresini giriniz:");
      if (!sifre) return;

      const girilenHash = await hashCevir(sifre);

      if (girilenHash === ADMIN_HASH) {
        let islem = prompt("Yapmak istediğiniz işlem:\n1- Ekle\n2- Sil\n3- Düzenle");
        
        if (islem === "1") {
          let ad = prompt("Site adı:");
          let url = prompt("URL (https://...):");
          if(ad && url) linkler.push({isim: ad, url: url});
        } 
        else if (islem === "2") {
          let liste = linkler.map((l, i) => `${i}: ${l.isim}`).join("\n");
          let silinecek = prompt("Silmek istediğiniz numara:\n" + liste);
          if(linkler[silinecek]) linkler.splice(silinecek, 1);
        } 
        else if (islem === "3") {
          let liste = linkler.map((l, i) => `${i}: ${l.isim}`).join("\n");
          let index = prompt("Düzenlemek istediğiniz numara:\n" + liste);
          if(linkler[index]) {
            linkler[index].isim = prompt("Yeni ad:", linkler[index].isim) || linkler[index].isim;
            linkler[index].url = prompt("Yeni URL:", linkler[index].url) || linkler[index].url;
          }
        }
        render();
      } else {
        alert("Hatalı Şifre! Ayarlar açılmadı.");
      }
    }

    render();
  </script>
</body>
</html>
