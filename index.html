<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Preeqbs Sitesi</title>
  <style>
    body { background-color: #0d0d0d; color: #b300ff; font-family: Arial, sans-serif; text-align: center; }
    h1 { margin-top: 20px; }
    .link-kart { background-color: #1a1a1a; border-radius: 15px; padding: 20px; margin: 20px auto; width: 300px; color: white; }
    .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    #siteAyarlar { margin-top: 50px; cursor: pointer; color: #ff00ff; }
  </style>
</head>
<body>
  <h1>Hoşgeldin Preeqbs</h1>
  <div id="linkler"></div>
  <div id="siteAyarlar" onclick="siteAyarlarıPanel()">⚙️ Site Ayarları</div>

  <script>
    let linkler = [{ isim: "Google", url: "https://www.google.com" }];
    let adminŞifre = "preeq198568381985";

    function renderLinkler() {
      let container = document.getElementById("linkler");
      container.innerHTML = "";
      linkler.forEach((link, index) => {
        let kart = document.createElement("div");
        kart.className = "link-kart";
        kart.innerHTML = `<h2>${link.isim}</h2><button class="btn" onclick="window.open('${link.url}', '_blank')">Git</button>`;
        container.appendChild(kart);
      });
    }

    function siteAyarlarıPanel() {
      let sifre = prompt("Admin şifresini giriniz:");
      if (sifre === adminŞifre) {
        let işlem = prompt("1-Ekle, 2-Sil, 3-Düzenle");
        // İşlem mantığı buraya gelir...
        renderLinkler();
      }
    }
    renderLinkler();
  </script>
</body>
</html>
